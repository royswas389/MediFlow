openapi: 3.1.0
info:
  title: Api
  version: 0.1.0
  description: MediFlow AI – Hospital Flow Intelligence Platform API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: patients
    description: Patient registration and management
  - name: departments
    description: Hospital departments
  - name: doctors
    description: Doctor profiles and availability
  - name: queue
    description: Smart queue engine
  - name: triage
    description: AI triage and classification
  - name: appointments
    description: Appointment booking
  - name: analytics
    description: Dashboard analytics and insights

paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  # ─── PATIENTS ───────────────────────────────────────────────────────────────
  /patients:
    get:
      operationId: listPatients
      tags: [patients]
      summary: List all patients
      parameters:
        - in: query
          name: search
          schema:
            type: string
        - in: query
          name: status
          schema:
            type: string
            enum: [waiting, in_consultation, completed, emergency]
        - in: query
          name: limit
          schema:
            type: integer
            default: 50
        - in: query
          name: offset
          schema:
            type: integer
            default: 0
      responses:
        "200":
          description: List of patients
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Patient"
    post:
      operationId: registerPatient
      tags: [patients]
      summary: Register a new patient
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PatientInput"
      responses:
        "201":
          description: Patient registered
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Patient"

  /patients/{id}:
    get:
      operationId: getPatient
      tags: [patients]
      summary: Get a patient by ID
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Patient details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Patient"
        "404":
          description: Not found
    patch:
      operationId: updatePatient
      tags: [patients]
      summary: Update patient details
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PatientUpdate"
      responses:
        "200":
          description: Updated patient
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Patient"

  /patients/{id}/token:
    get:
      operationId: getPatientToken
      tags: [patients]
      summary: Get token/queue status for a patient
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Patient token and queue info
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/QueueToken"

  # ─── DEPARTMENTS ─────────────────────────────────────────────────────────────
  /departments:
    get:
      operationId: listDepartments
      tags: [departments]
      summary: List all departments
      responses:
        "200":
          description: List of departments
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Department"
    post:
      operationId: createDepartment
      tags: [departments]
      summary: Create a department
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/DepartmentInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Department"

  /departments/{id}:
    get:
      operationId: getDepartment
      tags: [departments]
      summary: Get department details
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Department details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Department"

  /departments/{id}/queue:
    get:
      operationId: getDepartmentQueue
      tags: [departments]
      summary: Get live queue for a department
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Department queue
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/QueueToken"

  # ─── DOCTORS ─────────────────────────────────────────────────────────────────
  /doctors:
    get:
      operationId: listDoctors
      tags: [doctors]
      summary: List all doctors
      parameters:
        - in: query
          name: departmentId
          schema:
            type: integer
        - in: query
          name: available
          schema:
            type: boolean
      responses:
        "200":
          description: List of doctors
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Doctor"
    post:
      operationId: createDoctor
      tags: [doctors]
      summary: Create a doctor profile
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/DoctorInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Doctor"

  /doctors/{id}:
    get:
      operationId: getDoctor
      tags: [doctors]
      summary: Get doctor by ID
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Doctor details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Doctor"
    patch:
      operationId: updateDoctor
      tags: [doctors]
      summary: Update doctor availability/status
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/DoctorUpdate"
      responses:
        "200":
          description: Updated doctor
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Doctor"

  /doctors/{id}/queue:
    get:
      operationId: getDoctorQueue
      tags: [doctors]
      summary: Get patient queue for a specific doctor
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Doctor queue
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/QueueToken"

  # ─── QUEUE ───────────────────────────────────────────────────────────────────
  /queue/tokens:
    get:
      operationId: listTokens
      tags: [queue]
      summary: List all active queue tokens
      parameters:
        - in: query
          name: departmentId
          schema:
            type: integer
        - in: query
          name: doctorId
          schema:
            type: integer
        - in: query
          name: status
          schema:
            type: string
            enum: [waiting, called, in_consultation, completed, cancelled, emergency]
      responses:
        "200":
          description: List of tokens
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/QueueToken"
    post:
      operationId: issueToken
      tags: [queue]
      summary: Issue a new queue token
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TokenInput"
      responses:
        "201":
          description: Token issued
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/QueueToken"

  /queue/tokens/{id}:
    get:
      operationId: getToken
      tags: [queue]
      summary: Get token details
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Token details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/QueueToken"
    patch:
      operationId: updateToken
      tags: [queue]
      summary: Update token status (call, complete, cancel)
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TokenUpdate"
      responses:
        "200":
          description: Updated token
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/QueueToken"

  /queue/tokens/{id}/emergency:
    post:
      operationId: escalateToEmergency
      tags: [queue]
      summary: Escalate a token to emergency priority
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Escalated token
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/QueueToken"

  /queue/wait-time/{departmentId}:
    get:
      operationId: getWaitTimePrediction
      tags: [queue]
      summary: Get AI-predicted wait time for a department
      parameters:
        - in: path
          name: departmentId
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Wait time prediction
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WaitTimePrediction"

  # ─── TRIAGE ──────────────────────────────────────────────────────────────────
  /triage:
    post:
      operationId: triagePatient
      tags: [triage]
      summary: Run AI triage classification for a patient
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TriageInput"
      responses:
        "200":
          description: Triage result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TriageResult"

  /triage/history:
    get:
      operationId: listTriageHistory
      tags: [triage]
      summary: List recent triage assessments
      parameters:
        - in: query
          name: limit
          schema:
            type: integer
            default: 20
      responses:
        "200":
          description: Triage history
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/TriageResult"

  # ─── APPOINTMENTS ────────────────────────────────────────────────────────────
  /appointments:
    get:
      operationId: listAppointments
      tags: [appointments]
      summary: List appointments
      parameters:
        - in: query
          name: patientId
          schema:
            type: integer
        - in: query
          name: doctorId
          schema:
            type: integer
        - in: query
          name: date
          schema:
            type: string
            format: date
        - in: query
          name: status
          schema:
            type: string
            enum: [scheduled, confirmed, completed, cancelled, no_show]
      responses:
        "200":
          description: List of appointments
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Appointment"
    post:
      operationId: bookAppointment
      tags: [appointments]
      summary: Book a new appointment
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AppointmentInput"
      responses:
        "201":
          description: Appointment booked
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Appointment"

  /appointments/{id}:
    get:
      operationId: getAppointment
      tags: [appointments]
      summary: Get appointment details
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Appointment details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Appointment"
    patch:
      operationId: updateAppointment
      tags: [appointments]
      summary: Update appointment status
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AppointmentUpdate"
      responses:
        "200":
          description: Updated appointment
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Appointment"
    delete:
      operationId: cancelAppointment
      tags: [appointments]
      summary: Cancel an appointment
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Cancelled

  # ─── ANALYTICS ───────────────────────────────────────────────────────────────
  /analytics/summary:
    get:
      operationId: getHospitalSummary
      tags: [analytics]
      summary: Hospital-wide operational summary
      responses:
        "200":
          description: Summary stats
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HospitalSummary"

  /analytics/congestion:
    get:
      operationId: getDepartmentCongestion
      tags: [analytics]
      summary: Real-time congestion levels per department
      responses:
        "200":
          description: Congestion data
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/DepartmentCongestion"

  /analytics/hourly-flow:
    get:
      operationId: getHourlyFlow
      tags: [analytics]
      summary: Patient flow by hour of day (last 7 days avg)
      responses:
        "200":
          description: Hourly flow data
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/HourlyFlow"

  /analytics/triage-breakdown:
    get:
      operationId: getTriageBreakdown
      tags: [analytics]
      summary: Triage category breakdown for today
      responses:
        "200":
          description: Triage stats
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TriageBreakdown"

  /analytics/doctor-workload:
    get:
      operationId: getDoctorWorkload
      tags: [analytics]
      summary: Current workload per doctor
      responses:
        "200":
          description: Doctor workload data
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/DoctorWorkload"

  /analytics/recent-activity:
    get:
      operationId: getRecentActivity
      tags: [analytics]
      summary: Recent patient activity feed
      parameters:
        - in: query
          name: limit
          schema:
            type: integer
            default: 20
      responses:
        "200":
          description: Recent activity
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ActivityEvent"

# ─── SCHEMAS ────────────────────────────────────────────────────────────────
components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required: [status]

    Patient:
      type: object
      required: [id, name, phone, hospitalId, status, createdAt]
      properties:
        id:
          type: integer
        name:
          type: string
        phone:
          type: string
        email:
          type: ["string", "null"]
        age:
          type: ["integer", "null"]
        gender:
          type: ["string", "null"]
          enum: [male, female, other, null]
        bloodGroup:
          type: ["string", "null"]
        hospitalId:
          type: string
        status:
          type: string
          enum: [registered, waiting, in_consultation, completed, emergency]
        medicalHistory:
          type: ["string", "null"]
        address:
          type: ["string", "null"]
        createdAt:
          type: string
          format: date-time

    PatientInput:
      type: object
      required: [name, phone]
      properties:
        name:
          type: string
          minLength: 1
        phone:
          type: string
        email:
          type: string
        age:
          type: integer
        gender:
          type: string
          enum: [male, female, other]
        bloodGroup:
          type: string
        medicalHistory:
          type: string
        address:
          type: string

    PatientUpdate:
      type: object
      properties:
        name:
          type: string
        phone:
          type: string
        email:
          type: string
        age:
          type: integer
        gender:
          type: string
        bloodGroup:
          type: string
        medicalHistory:
          type: string
        address:
          type: string
        status:
          type: string

    Department:
      type: object
      required: [id, name, code, status, capacity, currentLoad]
      properties:
        id:
          type: integer
        name:
          type: string
        code:
          type: string
        description:
          type: ["string", "null"]
        status:
          type: string
          enum: [active, busy, overloaded, closed]
        capacity:
          type: integer
        currentLoad:
          type: integer
        avgWaitMinutes:
          type: integer
        floor:
          type: ["string", "null"]

    DepartmentInput:
      type: object
      required: [name, code, capacity]
      properties:
        name:
          type: string
        code:
          type: string
        description:
          type: string
        capacity:
          type: integer
        floor:
          type: string

    Doctor:
      type: object
      required: [id, name, specialization, departmentId, status, consultationsToday]
      properties:
        id:
          type: integer
        name:
          type: string
        specialization:
          type: string
        departmentId:
          type: integer
        departmentName:
          type: ["string", "null"]
        status:
          type: string
          enum: [available, busy, on_break, off_duty]
        consultationsToday:
          type: integer
        avgConsultationMinutes:
          type: integer
        currentPatientId:
          type: ["integer", "null"]
        queueLength:
          type: integer

    DoctorInput:
      type: object
      required: [name, specialization, departmentId]
      properties:
        name:
          type: string
        specialization:
          type: string
        departmentId:
          type: integer
        avgConsultationMinutes:
          type: integer

    DoctorUpdate:
      type: object
      properties:
        name:
          type: string
        status:
          type: string
          enum: [available, busy, on_break, off_duty]
        avgConsultationMinutes:
          type: integer

    QueueToken:
      type: object
      required: [id, tokenNumber, patientId, patientName, departmentId, status, priority, issuedAt, estimatedWaitMinutes]
      properties:
        id:
          type: integer
        tokenNumber:
          type: string
        patientId:
          type: integer
        patientName:
          type: string
        departmentId:
          type: integer
        departmentName:
          type: ["string", "null"]
        doctorId:
          type: ["integer", "null"]
        doctorName:
          type: ["string", "null"]
        status:
          type: string
          enum: [waiting, called, in_consultation, completed, cancelled, emergency]
        priority:
          type: integer
        triageCategory:
          type: ["string", "null"]
          enum: [emergency, urgent, normal, null]
        estimatedWaitMinutes:
          type: integer
        issuedAt:
          type: string
          format: date-time
        calledAt:
          type: ["string", "null"]
          format: date-time
        completedAt:
          type: ["string", "null"]
          format: date-time
        position:
          type: integer

    TokenInput:
      type: object
      required: [patientId, departmentId]
      properties:
        patientId:
          type: integer
        departmentId:
          type: integer
        doctorId:
          type: integer
        triageCategory:
          type: string
          enum: [emergency, urgent, normal]

    TokenUpdate:
      type: object
      properties:
        status:
          type: string
          enum: [waiting, called, in_consultation, completed, cancelled, emergency]
        doctorId:
          type: integer

    WaitTimePrediction:
      type: object
      required: [departmentId, estimatedMinutes, queueLength, confidence]
      properties:
        departmentId:
          type: integer
        estimatedMinutes:
          type: integer
        queueLength:
          type: integer
        confidence:
          type: number
        factors:
          type: array
          items:
            type: string

    TriageInput:
      type: object
      required: [patientId, symptoms]
      properties:
        patientId:
          type: integer
        symptoms:
          type: string
        age:
          type: integer
        vitalSigns:
          type: ["string", "null"]
        medicalHistory:
          type: ["string", "null"]

    TriageResult:
      type: object
      required: [id, patientId, category, riskScore, reasoning, createdAt]
      properties:
        id:
          type: integer
        patientId:
          type: integer
        patientName:
          type: ["string", "null"]
        category:
          type: string
          enum: [emergency, urgent, normal]
        riskScore:
          type: number
        reasoning:
          type: string
        symptoms:
          type: string
        recommendedDepartment:
          type: ["string", "null"]
        createdAt:
          type: string
          format: date-time

    Appointment:
      type: object
      required: [id, patientId, patientName, doctorId, doctorName, departmentId, scheduledAt, status, createdAt]
      properties:
        id:
          type: integer
        patientId:
          type: integer
        patientName:
          type: string
        doctorId:
          type: integer
        doctorName:
          type: string
        departmentId:
          type: integer
        departmentName:
          type: ["string", "null"]
        scheduledAt:
          type: string
          format: date-time
        status:
          type: string
          enum: [scheduled, confirmed, completed, cancelled, no_show]
        notes:
          type: ["string", "null"]
        createdAt:
          type: string
          format: date-time

    AppointmentInput:
      type: object
      required: [patientId, doctorId, departmentId, scheduledAt]
      properties:
        patientId:
          type: integer
        doctorId:
          type: integer
        departmentId:
          type: integer
        scheduledAt:
          type: string
          format: date-time
        notes:
          type: string

    AppointmentUpdate:
      type: object
      properties:
        status:
          type: string
          enum: [scheduled, confirmed, completed, cancelled, no_show]
        scheduledAt:
          type: string
          format: date-time
        notes:
          type: string

    HospitalSummary:
      type: object
      required: [totalPatientsToday, activeTokens, avgWaitMinutes, emergencyCount, departmentsOverloaded, doctorsAvailable, appointmentsToday, completedToday]
      properties:
        totalPatientsToday:
          type: integer
        activeTokens:
          type: integer
        avgWaitMinutes:
          type: integer
        emergencyCount:
          type: integer
        departmentsOverloaded:
          type: integer
        doctorsAvailable:
          type: integer
        appointmentsToday:
          type: integer
        completedToday:
          type: integer
        peakHour:
          type: ["string", "null"]

    DepartmentCongestion:
      type: object
      required: [departmentId, departmentName, congestionLevel, queueLength, capacity, waitMinutes]
      properties:
        departmentId:
          type: integer
        departmentName:
          type: string
        congestionLevel:
          type: string
          enum: [low, moderate, high, critical]
        queueLength:
          type: integer
        capacity:
          type: integer
        waitMinutes:
          type: integer
        trend:
          type: string
          enum: [increasing, stable, decreasing]

    HourlyFlow:
      type: object
      required: [hour, count]
      properties:
        hour:
          type: integer
        count:
          type: integer
        label:
          type: string

    TriageBreakdown:
      type: object
      required: [emergency, urgent, normal, total]
      properties:
        emergency:
          type: integer
        urgent:
          type: integer
        normal:
          type: integer
        total:
          type: integer

    DoctorWorkload:
      type: object
      required: [doctorId, doctorName, specialization, queueLength, consultationsToday, status]
      properties:
        doctorId:
          type: integer
        doctorName:
          type: string
        specialization:
          type: string
        departmentName:
          type: string
        queueLength:
          type: integer
        consultationsToday:
          type: integer
        status:
          type: string
          enum: [available, busy, on_break, off_duty]
        avgConsultationMinutes:
          type: integer

    ActivityEvent:
      type: object
      required: [id, type, description, timestamp]
      properties:
        id:
          type: integer
        type:
          type: string
          enum: [registration, token_issued, called, completed, emergency, triage, appointment]
        description:
          type: string
